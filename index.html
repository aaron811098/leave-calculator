<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>員工特休計算系統</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg1:#fff7ed;--bg2:#eff6ff;--card:rgba(255,255,255,.82);--white:#fff;--text:#1f2937;--muted:#64748b;
      --primary:#fb7185;--primary2:#e11d48;--accent:#e11d48;--blue:#3b82f6;--danger:#ef4444;
      --border:rgba(255,255,255,.85);--line:#ffe4e6;--shadow:0 22px 55px rgba(225,29,72,.14);--radius:28px
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:var(--text);min-height:100vh}
    body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 15% 10%,rgba(251,113,133,.28),transparent 32%),radial-gradient(circle at 85% 20%,rgba(59,130,246,.18),transparent 30%),radial-gradient(circle at 70% 90%,rgba(251,191,36,.16),transparent 35%);pointer-events:none}
    .auth-screen{position:relative;min-height:100vh;display:grid;place-items:center;padding:22px}
    .login-card{width:min(460px,100%);background:var(--card);border:1px solid var(--border);border-radius:32px;box-shadow:var(--shadow);padding:32px;backdrop-filter:blur(14px)}
    .login-card h1{margin:0 0 8px;font-size:34px;letter-spacing:-.04em}.login-card p{margin:0 0 24px;color:var(--muted);line-height:1.7}.login-logo{width:64px;height:64px;border-radius:22px;background:#fff1f2;color:var(--accent);display:grid;place-items:center;font-size:30px;margin-bottom:18px}.login-tip{margin-top:16px;font-size:13px;color:var(--muted);line-height:1.7}
    .app{position:relative;max-width:1080px;margin:auto;padding:30px 18px 54px;display:none}
    header{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-bottom:22px}
    .brand h1{margin:0;font-size:clamp(28px,5vw,44px);letter-spacing:-.04em}
    .header-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}.user-email{font-size:13px;color:var(--muted);background:rgba(255,255,255,.7);border:1px solid var(--border);border-radius:999px;padding:9px 12px;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;backdrop-filter:blur(14px)}
    .view{display:none}.view.active{display:block}
    h2{margin:0 0 6px;font-size:28px;letter-spacing:-.03em}.muted{color:var(--muted);font-size:14px}
    .home-hero{display:flex;justify-content:space-between;gap:18px;align-items:center;margin-bottom:20px}.home-hero h2{font-size:34px}.home-hero p{margin:8px 0 0;color:var(--muted)}
    .home-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .menu-card{border:1px solid rgba(255,255,255,.95);border-radius:24px;background:rgba(255,255,255,.9);padding:22px;cursor:pointer;transition:.18s;text-align:left;min-height:174px;box-shadow:0 12px 28px rgba(15,23,42,.06);display:grid;grid-template-columns:52px 1fr;align-items:center;column-gap:14px;row-gap:12px;color:var(--text);appearance:none;-webkit-appearance:none}
    .menu-card:hover{transform:translateY(-4px);box-shadow:0 18px 36px rgba(225,29,72,.15)}
    .menu-icon{grid-column:1;grid-row:1;width:52px;height:52px;display:grid;place-items:center;background:#fff1f2;color:var(--accent);border-radius:18px;margin-bottom:0}.menu-icon svg{width:30px;height:30px;display:block}.menu-card h2{grid-column:2;grid-row:1;margin:0;font-size:21px;color:#0ea5e9}.menu-card p{grid-column:1 / -1;margin:0;color:var(--muted);font-size:14px;line-height:1.6}
    .soft-panel{margin-top:20px;background:rgba(255,255,255,.66);border:1px solid rgba(255,255,255,.9);border-radius:26px;padding:18px}.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.stat{background:#fff;border:1px solid #ffe4e6;border-radius:20px;padding:16px;color:var(--muted)}.stat b{display:block;font-size:26px;color:var(--accent);margin-top:8px}
    .toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
    .btn{border:0;border-radius:16px;background:var(--primary);color:#fff;padding:12px 16px;font-weight:900;cursor:pointer;font-size:15px;box-shadow:0 10px 22px rgba(225,29,72,.18)}.btn:hover{background:var(--primary2)}.btn:disabled{opacity:.55;cursor:not-allowed}
    .btn.secondary{background:#fff;color:#9f1239;border:1px solid #fecdd3;box-shadow:none}.btn.danger{background:var(--danger)}.btn.ghost{background:transparent;color:var(--accent);padding:8px;box-shadow:none}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.field label{display:block;font-weight:900;margin-bottom:8px}.field input{width:100%;border:1px solid #fecdd3;border-radius:16px;padding:14px 15px;font-size:16px;background:#fff}.field input:focus{outline:3px solid rgba(251,113,133,.22);border-color:#fb7185}.account-wrap{display:flex;align-items:center;border:1px solid #fecdd3;border-radius:16px;background:#fff;overflow:hidden}.account-wrap:focus-within{outline:3px solid rgba(251,113,133,.22);border-color:#fb7185}.account-wrap input{border:0;border-radius:0;outline:0;min-width:0}.account-wrap input:focus{outline:0;border:0}.account-suffix{padding:0 14px 0 4px;color:#9ca3af;font-weight:400;white-space:nowrap;background:#fff}
    .login-card .field{margin-bottom:14px}.login-card .btn{width:100%;margin-top:6px;padding:14px 16px}
    .employee-list{display:grid;gap:12px}.employee-card{display:grid;grid-template-columns:1fr auto auto;gap:14px;align-items:center;padding:16px;border:1px solid #ffe4e6;border-radius:22px;background:#fff7f8}.employee-card.clickable{cursor:pointer;transition:.18s}.employee-card.clickable:hover{transform:translateY(-2px);background:#fff;box-shadow:0 12px 26px rgba(225,29,72,.12)}.employee-main strong{font-size:18px}.pill{display:inline-block;background:#fff;color:#e11d48;border:1px solid #fecdd3;border-radius:999px;padding:8px 11px;font-weight:900}
    .detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:18px}.info-box{background:#fff;border:1px solid #ffe4e6;border-radius:22px;padding:18px}.info-box span{display:block;color:var(--muted);font-size:14px;margin-bottom:8px}.info-box strong{font-size:20px;color:#9f1239}
    .empty{padding:28px;border:1px dashed #fda4af;border-radius:20px;text-align:center;color:var(--muted);background:#fff}.notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:18px;padding:14px;margin:12px 0}.status{font-size:14px;color:var(--muted);margin-top:10px}
    .modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.38);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}.modal-backdrop.show{display:flex}.modal-card{width:min(420px,100%);background:#fff;border:1px solid #ffe4e6;border-radius:28px;padding:24px;box-shadow:0 28px 60px rgba(15,23,42,.2)}.modal-card h3{margin:0 0 6px;font-size:28px}.modal-card p{margin:0 0 18px;color:var(--muted);line-height:1.7}.modal-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:18px}.subtle-note{margin-top:10px;color:var(--muted);font-size:14px}
    @media(max-width:760px){.app{padding:22px 14px 40px}header{align-items:center;flex-direction:row;justify-content:space-between;gap:10px}.brand{min-width:0}.brand h1{font-size:30px;line-height:1.15}.header-actions{justify-content:flex-end;flex-wrap:nowrap;margin-left:auto}.header-actions .btn{white-space:nowrap;padding:12px 16px}.home-hero{align-items:flex-start;flex-direction:column}.home-grid,.form-grid,.detail-grid,.stat-grid{grid-template-columns:1fr}.menu-card{grid-template-columns:64px 1fr;column-gap:16px;min-height:auto;padding:20px}.menu-icon{width:64px;height:64px}.menu-icon svg{width:36px;height:36px}.menu-card h2{font-size:24px;color:#0ea5e9}.employee-card{grid-template-columns:1fr}.card{padding:20px}.home-hero h2{font-size:30px}.login-card{padding:26px 20px}.login-card h1{font-size:30px}.modal-card{padding:22px 18px}.modal-card h3{font-size:24px}.modal-actions .btn{flex:1}}@media(max-width:390px){.brand h1{font-size:28px}.header-actions .btn{padding:11px 14px}.menu-card{grid-template-columns:58px 1fr;padding:18px}.menu-icon{width:58px;height:58px}.menu-icon svg{width:34px;height:34px}.menu-card h2{font-size:22px;color:#0ea5e9}}
  </style>
</head>
<body>
  <section id="authView" class="auth-screen">
    <div class="login-card">
      <h1>員工特休計算系統</h1>
      <p>請使用管理員帳號登入後查看、新增、編輯或刪除員工資料。</p>
      <div id="authConfigNotice" class="notice" style="display:none">尚未設定 Supabase URL 與 anon key，請先打開 index.html 修改設定。</div>
      <form id="loginForm">
        <div class="field">
          <label for="loginAccount">帳號</label>
          <div class="account-wrap">
            <input id="loginAccount" type="text" autocomplete="username" required placeholder="admin" inputmode="email">
            <span class="account-suffix">@leave.calculator</span>
          </div>
        </div>
        <div class="field">
          <label for="loginPassword">密碼</label>
          <input id="loginPassword" type="password" autocomplete="current-password" required placeholder="請輸入密碼">
        </div>
        <button class="btn" id="loginButton" type="submit">登入</button>
      </form>
      <div class="status" id="loginStatus"></div>
    </div>
  </section>

  <div id="appShell" class="app">
    <header>
      <div class="brand"><h1>員工特休計算系統</h1></div>
      <div class="header-actions">
        <button class="btn secondary" onclick="logout()">登出</button>
      </div>
    </header>

    <section id="homeView" class="view active card">
      <div class="home-grid">
        <button class="menu-card" onclick="showView('listView')"><div class="menu-icon" aria-hidden="true"><svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="26" cy="20" r="10" fill="currentColor" opacity="0.95"/><circle cx="45" cy="24" r="8" fill="currentColor" opacity="0.78"/><path d="M11 52C11 40.402 20.402 31 32 31H34C45.598 31 55 40.402 55 52V54H11V52Z" fill="currentColor" opacity="0.95"/><path d="M33 54V49.5C33 41.492 39.492 35 47.5 35C55.508 35 62 41.492 62 49.5V54H33Z" transform="translate(-7 -1)" fill="currentColor" opacity="0.78"/></svg></div><h2>查看員工資料</h2><p>查看特休、年資與特休期限，也可以編輯員工資料。</p></button>
        <button class="menu-card" onclick="showAddView()"><div class="menu-icon" aria-hidden="true"><svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="28" cy="22" r="10" fill="currentColor" opacity="0.92"/><path d="M14 52C14 41.507 22.507 33 33 33H34C44.493 33 53 41.507 53 52V54H14V52Z" fill="currentColor" opacity="0.92"/><circle cx="48" cy="47" r="12" fill="white" stroke="currentColor" stroke-width="3"/><path d="M48 41V53" stroke="currentColor" stroke-width="4" stroke-linecap="round"/><path d="M42 47H54" stroke="currentColor" stroke-width="4" stroke-linecap="round"/></svg></div><h2>新增員工</h2><p>新增員工姓名與入職日期。</p></button>
        <button class="menu-card" onclick="showView('deleteView')"><div class="menu-icon" aria-hidden="true"><svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22 18H42" stroke="currentColor" stroke-width="4" stroke-linecap="round"/><path d="M26 18V15C26 12.791 27.791 11 30 11H34C36.209 11 38 12.791 38 15V18" stroke="currentColor" stroke-width="4" stroke-linecap="round"/><path d="M18 21H46L43.733 48.206C43.556 50.33 41.78 52 39.649 52H24.351C22.22 52 20.444 50.33 20.267 48.206L18 21Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/><path d="M27 28V43" stroke="currentColor" stroke-width="4" stroke-linecap="round"/><path d="M37 28V43" stroke="currentColor" stroke-width="4" stroke-linecap="round"/></svg></div><h2>刪除員工</h2><p>刪除離職或不需要保留的員工資料。</p></button>
      </div>
    </section>

    <section id="listView" class="view card">
      <div class="toolbar"><div><h2>查看員工資料</h2><p class="muted">點選員工即可查看完整特休資訊，也可直接編輯員工資料。</p></div><div class="actions"><button class="btn secondary" onclick="showView('homeView')">回首頁</button><button class="btn" onclick="showAddView()">新增員工</button></div></div>
      <div id="employeeList" class="employee-list"></div>
      <div class="status" id="listStatus"></div>
    </section>

    <section id="detailView" class="view card"><div id="employeeDetail"></div></section>

    <section id="formView" class="view card">
      <div class="toolbar"><div><h2 id="formTitle">新增員工</h2><p class="muted">輸入姓名與入職日期後儲存。</p></div><button class="btn secondary" onclick="showView('homeView')">回首頁</button></div>
      <form id="employeeForm">
        <input type="hidden" id="employeeId">
        <div class="form-grid">
          <div class="field"><label for="employeeName">員工姓名</label><input id="employeeName" required placeholder="例：王小明"></div>
          <div class="field"><label for="startDate">入職日期</label><input id="startDate" type="date" required></div>
        </div>
        <div class="actions"><button class="btn" type="submit">儲存</button><button class="btn secondary" type="button" onclick="showView('listView')">取消</button></div>
      </form>
      <div class="status" id="formStatus"></div>
    </section>

    <section id="deleteView" class="view card">
      <div class="toolbar"><div><h2>刪除員工</h2><p class="muted">刪除後無法從網頁還原。</p></div><button class="btn secondary" onclick="showView('homeView')">回首頁</button></div>
      <div id="deleteList" class="employee-list"></div>
      <div class="status" id="deleteStatus"></div>
    </section>
  </div>

  <div id="leaveModal" class="modal-backdrop">
    <div class="modal-card">
      <h3>使用特休</h3>
      <p id="leaveModalText">請輸入本次使用的特休天數。</p>
      <form id="leaveForm">
        <div class="field">
          <label for="leaveDaysInput">使用天數</label>
          <input id="leaveDaysInput" type="number" min="0.5" step="0.5" required placeholder="例如：1 或 0.5">
        </div>
        <div class="subtle-note" id="leaveRemainingNote"></div>
        <div class="status" id="leaveStatus"></div>
        <div class="modal-actions">
          <button type="button" class="btn secondary" onclick="closeLeaveModal()">取消</button>
          <button type="submit" class="btn" id="leaveSubmitButton">送出</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://jbrbaphximdnqwyoatvp.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_O4HLjBLFa5y5IDA9OMdV8g_6Ujf49RQ';
    const TABLE_NAME = 'employees';
    const LOGIN_EMAIL_DOMAIN = '@leave.calculator';
    const supabaseReady = SUPABASE_URL.startsWith('https://') && SUPABASE_ANON_KEY.length > 30;
    const db = supabaseReady ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
    let currentDetailEmployeeId = '';

    function getToday(){const now=new Date();return new Date(now.getFullYear(),now.getMonth(),now.getDate())}
    function parseDate(str){const [y,m,d]=str.split('-').map(Number);return new Date(y,m-1,d)}
    function formatDate(date){const y=date.getFullYear();const m=String(date.getMonth()+1).padStart(2,'0');const d=String(date.getDate()).padStart(2,'0');return `${y}-${m}-${d}`}
    function addMonths(date,months){const d=new Date(date);const day=d.getDate();d.setMonth(d.getMonth()+months);if(d.getDate()<day)d.setDate(0);return d}
    function addYears(date,years){return addMonths(date,years*12)}
    function diffYMD(start,end){let y=end.getFullYear()-start.getFullYear();let m=end.getMonth()-start.getMonth();let d=end.getDate()-start.getDate();if(d<0){m--;const prev=new Date(end.getFullYear(),end.getMonth(),0);d+=prev.getDate()}if(m<0){y--;m+=12}return{years:y,months:m,days:d}}
    function getCompletedYears(start,today){let years=today.getFullYear()-start.getFullYear();if(addYears(start,years)>today)years--;return Math.max(0,years)}
    function getLeaveDays(start,today){
      if(today<addMonths(start,6))return 0;
      if(today<addYears(start,1))return 3;
      if(today<addYears(start,2))return 7;
      if(today<addYears(start,3))return 10;
      if(today<addYears(start,5))return 14;
      if(today<addYears(start,10))return 15;
      const years=getCompletedYears(start,today);
      return Math.min(15+(years-9),30);
    }
    function getCurrentPeriod(start,today){const half=addMonths(start,6);if(today<half)return{periodStart:null,periodEnd:null};if(today<addYears(start,1))return{periodStart:half,periodEnd:new Date(addYears(start,1).getTime()-86400000)};let years=today.getFullYear()-start.getFullYear();let pStart=addYears(start,years);if(pStart>today){years--;pStart=addYears(start,years)}return{periodStart:pStart,periodEnd:new Date(addYears(pStart,1).getTime()-86400000)}}
    function getNextIncrease(start,today){const checkpoints=[6,12,24,36,60,120,132,144,156,168,180,192,204,216,228,240,252,264,276,288,300,312,324,336,348,360];for(const m of checkpoints){const date=addMonths(start,m);if(date>today)return{date,days:getLeaveDays(start,date)}}return null}
    function escapeHtml(text){return String(text).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
    function normalizeUsedLeaveDays(value){const n=Number(value||0);return Number.isFinite(n)&&n>0?n:0}
    function getRemainingLeaveDays(total,used){return Math.max(0, +(total - normalizeUsedLeaveDays(used)).toFixed(2))}
    function formatLeaveDays(days){const rounded = Number(days);return Number.isInteger(rounded)? `${rounded}` : `${rounded}`.replace(/\.0+$/,'').replace(/(\.\d*[1-9])0+$/,'$1')}

    async function loadEmployees(){if(!db) return [];const {data,error}=await db.from(TABLE_NAME).select('*').order('start_date',{ascending:true});if(error){alert('讀取失敗：'+error.message);return []}return data.map(row=>({id:row.id,name:row.name,startDate:row.start_date,usedLeaveDays:normalizeUsedLeaveDays(row.used_leave_days)}))}
    async function insertEmployee(employee){const {error}=await db.from(TABLE_NAME).insert({name:employee.name,start_date:employee.startDate});if(error)throw error}
    async function updateEmployee(employee){const {error}=await db.from(TABLE_NAME).update({name:employee.name,start_date:employee.startDate,updated_at:new Date().toISOString()}).eq('id',employee.id);if(error)throw error}
    async function updateUsedLeave(id, usedLeaveDays){const {error}=await db.from(TABLE_NAME).update({used_leave_days:usedLeaveDays,updated_at:new Date().toISOString()}).eq('id',id);if(error)throw error}
    async function removeEmployee(id){const {error}=await db.from(TABLE_NAME).delete().eq('id',id);if(error)throw error}

    async function showView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');if(id==='listView')await renderEmployeeList();if(id==='deleteView')await renderDeleteList()}
    function showAddView(){document.getElementById('formTitle').textContent='新增員工';document.getElementById('employeeId').value='';document.getElementById('employeeName').value='';document.getElementById('startDate').value='';document.getElementById('formStatus').textContent='';showView('formView')}
    async function showEditView(id){const employees=await loadEmployees();const employee=employees.find(e=>e.id===id);if(!employee)return;document.getElementById('formTitle').textContent='編輯員工資料';document.getElementById('employeeId').value=employee.id;document.getElementById('employeeName').value=employee.name;document.getElementById('startDate').value=employee.startDate;document.getElementById('formStatus').textContent='';showView('formView')}

    async function renderEmployeeList(){const list=document.getElementById('employeeList');const status=document.getElementById('listStatus');list.innerHTML='<div class="empty">讀取中...</div>';const employees=await loadEmployees();status.textContent=`共 ${employees.length} 位員工`;if(!employees.length){list.innerHTML='<div class="empty">目前沒有員工資料，請先新增員工。</div>';return}const today=getToday();list.innerHTML=employees.map(e=>{const start=parseDate(e.startDate);const totalLeaveDays=getLeaveDays(start,today);const leaveDays=getRemainingLeaveDays(totalLeaveDays,e.usedLeaveDays);const s=diffYMD(start,today);return `<div class="employee-card clickable" onclick="showDetail('${e.id}')"><div class="employee-main"><strong>${escapeHtml(e.name)}</strong><div class="muted">入職日期：${e.startDate}</div></div><div><span class="pill">目前特休 ${formatLeaveDays(leaveDays)} 天</span><div class="muted" style="margin-top:8px">年資：${s.years} 年 ${s.months} 個月 ${s.days} 天</div></div><div class="actions" style="margin-top:0"><button class="btn secondary" onclick="event.stopPropagation();showEditView('${e.id}')">編輯</button></div></div>`}).join('')}
    async function showDetail(id){const employees=await loadEmployees();const e=employees.find(x=>x.id===id);if(!e)return;currentDetailEmployeeId=id;const start=parseDate(e.startDate);const today=getToday();const totalLeaveDays=getLeaveDays(start,today);const remainingLeaveDays=getRemainingLeaveDays(totalLeaveDays,e.usedLeaveDays);const s=diffYMD(start,today);const p=getCurrentPeriod(start,today);document.getElementById('employeeDetail').innerHTML=`<h3 style="font-size:28px;margin:0 0 4px">${escapeHtml(e.name)}</h3><div class="muted">入職日期：${e.startDate}</div><div class="detail-grid"><div class="info-box"><span>目前特休</span><strong>${formatLeaveDays(remainingLeaveDays)} 天</strong></div><div class="info-box"><span>目前年資</span><strong>${s.years} 年 ${s.months} 個月 ${s.days} 天</strong></div><div class="info-box"><span>本期特休期間</span><strong>${p.periodStart?`${formatDate(p.periodStart)} ～ ${formatDate(p.periodEnd)}`:'尚未產生特休'}</strong></div><div class="info-box"><span>已使用特休</span><strong>${formatLeaveDays(e.usedLeaveDays)} 天</strong></div></div><div class="actions"><button class="btn" onclick="showEditView('${e.id}')">編輯員工資料</button><button class="btn secondary" onclick="openLeaveModal('${e.id}')">使用特休</button><button class="btn secondary" onclick="showView('listView')">回員工列表</button></div>`;showView('detailView')}
    async function renderDeleteList(){const list=document.getElementById('deleteList');const status=document.getElementById('deleteStatus');list.innerHTML='<div class="empty">讀取中...</div>';const employees=await loadEmployees();status.textContent=`共 ${employees.length} 位員工`;if(!employees.length){list.innerHTML='<div class="empty">目前沒有可刪除的員工資料。</div>';return}list.innerHTML=employees.map(e=>`<div class="employee-card"><div class="employee-main"><strong>${escapeHtml(e.name)}</strong><div class="muted">入職日期：${e.startDate}</div></div><div class="muted">刪除後無法還原</div><button class="btn danger" onclick="deleteEmployee('${e.id}')">刪除</button></div>`).join('')}
    async function openLeaveModal(id){const employees=await loadEmployees();const employee=employees.find(e=>e.id===id);if(!employee)return;const totalLeaveDays=getLeaveDays(parseDate(employee.startDate),getToday());const remainingLeaveDays=getRemainingLeaveDays(totalLeaveDays,employee.usedLeaveDays);currentDetailEmployeeId=id;document.getElementById('leaveModalText').textContent=`請輸入 ${employee.name} 本次使用的特休天數。`;document.getElementById('leaveRemainingNote').textContent=`目前剩餘特休：${formatLeaveDays(remainingLeaveDays)} 天`;document.getElementById('leaveDaysInput').value='';document.getElementById('leaveDaysInput').max=remainingLeaveDays;document.getElementById('leaveStatus').textContent='';document.getElementById('leaveModal').classList.add('show');setTimeout(()=>document.getElementById('leaveDaysInput').focus(),0)}
    function closeLeaveModal(){document.getElementById('leaveModal').classList.remove('show');document.getElementById('leaveStatus').textContent=''}

    async function deleteEmployee(id){const employees=await loadEmployees();const employee=employees.find(e=>e.id===id);const name=employee?employee.name:'這位員工';if(!confirm(`確定要刪除「${name}」嗎？`))return;try{await removeEmployee(id);await renderDeleteList()}catch(err){alert('刪除失敗：'+err.message)}}

    document.getElementById('employeeForm').addEventListener('submit',async e=>{e.preventDefault();if(!db){alert('尚未設定 Supabase');return}const id=document.getElementById('employeeId').value;const name=document.getElementById('employeeName').value.trim();const startDate=document.getElementById('startDate').value;if(!name||!startDate)return;if(parseDate(startDate)>getToday()){alert('入職日期不能晚於今天。');return}document.getElementById('formStatus').textContent='儲存中...';try{if(id)await updateEmployee({id,name,startDate});else await insertEmployee({name,startDate});document.getElementById('formStatus').textContent='已儲存';await showView('listView')}catch(err){document.getElementById('formStatus').textContent='儲存失敗：'+err.message}})

    document.getElementById('leaveForm').addEventListener('submit',async e=>{
      e.preventDefault();
      if(!currentDetailEmployeeId)return;
      const employees=await loadEmployees();
      const employee=employees.find(item=>item.id===currentDetailEmployeeId);
      if(!employee)return;
      const totalLeaveDays=getLeaveDays(parseDate(employee.startDate),getToday());
      const remainingLeaveDays=getRemainingLeaveDays(totalLeaveDays,employee.usedLeaveDays);
      const inputValue=Number(document.getElementById('leaveDaysInput').value);
      const status=document.getElementById('leaveStatus');
      const button=document.getElementById('leaveSubmitButton');
      if(!Number.isFinite(inputValue) || inputValue<=0){status.textContent='請輸入正確的天數。';return}
      if(inputValue>remainingLeaveDays){status.textContent=`輸入天數不可大於目前剩餘特休 ${formatLeaveDays(remainingLeaveDays)} 天。`;return}
      button.disabled=true;
      status.textContent='送出中...';
      try{
        const nextUsedLeaveDays=+(employee.usedLeaveDays + inputValue).toFixed(2);
        await updateUsedLeave(currentDetailEmployeeId,nextUsedLeaveDays);
        closeLeaveModal();
        await showDetail(currentDetailEmployeeId);
      }catch(err){
        status.textContent='送出失敗：'+err.message+(err.message.includes('used_leave_days')?'，請先在 Supabase 新增 used_leave_days 欄位。':'');
      }finally{
        button.disabled=false;
      }
    })

    document.getElementById('loginForm').addEventListener('submit',async e=>{
      e.preventDefault();
      if(!db){document.getElementById('loginStatus').textContent='尚未設定 Supabase URL 與 anon key。';return}
      const rawAccount=document.getElementById('loginAccount').value.trim();
      const account=rawAccount.split('@')[0];
      const email=`${account}${LOGIN_EMAIL_DOMAIN}`;
      const password=document.getElementById('loginPassword').value;
      const button=document.getElementById('loginButton');
      const status=document.getElementById('loginStatus');
      if(!account){status.textContent='請輸入帳號。';return}
      button.disabled=true;
      status.textContent='登入中...';
      const {data,error}=await db.auth.signInWithPassword({email,password});
      button.disabled=false;
      if(error){status.textContent='登入失敗：'+error.message;return}
      showApp(data.session)
    })

    async function logout(){if(db)await db.auth.signOut();document.getElementById('appShell').style.display='none';document.getElementById('authView').style.display='grid';document.getElementById('loginAccount').value='';document.getElementById('loginPassword').value='';document.getElementById('loginStatus').textContent='已登出';showView('homeView')}
    function showApp(session){document.getElementById('authView').style.display='none';document.getElementById('appShell').style.display='block';showView('homeView')}
    async function init(){document.getElementById('authConfigNotice').style.display=supabaseReady?'none':'block';if(!db)return;const {data}=await db.auth.getSession();if(data.session)showApp(data.session);db.auth.onAuthStateChange((_event,session)=>{if(session)showApp(session);else{document.getElementById('appShell').style.display='none';document.getElementById('authView').style.display='grid'}})}
    document.getElementById('leaveModal').addEventListener('click',e=>{if(e.target.id==='leaveModal')closeLeaveModal()})
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLeaveModal()})

    init();
  </script>
</body>
</html>
